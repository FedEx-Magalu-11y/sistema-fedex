<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Magalu + FedEx</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="home-container">

<header class="home-header">

<div class="header-content">

<div class="header-logo">

<div class="header-logo-wrapper">
<img src="/magalu.png" class="header-logo-magalu">
</div>

<div class="header-logo-wrapper">
<img src="/fedex.png" class="header-logo-fedex">
</div>

</div>

<nav class="header-nav">

<a href="#">Serviços</a>
<a href="#">Rastreamento</a>
<a href="#">Suporte</a>

</nav>

</div>

</header>


<section class="hero-section">

<div class="hero-content">

<div class="hero-text">

<h1 class="hero-title">

Parceria
<span class="highlight-magalu">Magalu</span>
e
<span class="highlight-fedex">FedEx</span>

</h1>

<p class="hero-description">

<strong>Programa de Bonificação Magalu!</strong>
Confirme sua entrega e participe do sorteio de prêmios incríveis.
Entregas rápidas, seguras e confiáveis em todo o Brasil através da parceria entre Magalu e FedEx.

</p>

<button class="confirm-button">

⭐ Confirme sua entrega e concorra a prêmios exclusivos!

</button>

<div class="tracking-search-box">

<div class="search-title">
Rastreie seu pedido
</div>

<form class="search-form" onsubmit="buscar(event)">

<input
class="search-input"
id="codigo"
placeholder="Digite o código de rastreamento"
/>

<button class="search-button">
Rastrear
</button>

</form>

</div>

</div>


<div class="hero-image">

<img src="/banner.png">

</div>

</div>

</section>

</div>


<script>

function buscar(e){

e.preventDefault()

const code=document.getElementById("codigo").value

window.location.href="/rastreamento.html?code="+code

}

</script>

</body>
</html>
