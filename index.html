<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FedEx - Parceria Magalu</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f6fa;
}

/* HEADER */

header{
background:linear-gradient(90deg,#4d148c,#0071ce);
padding:20px 60px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:20px;
}

.logo img{
height:40px;
}

nav a{
color:white;
margin-left:30px;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
padding:80px 60px;
display:flex;
align-items:center;
justify-content:space-between;
}

.hero-text h1{
font-size:48px;
margin-bottom:20px;
}

.hero-text span{
color:#0071ce;
}

.hero-text p{
font-size:18px;
margin-bottom:20px;
}

.confirm-box{
background:white;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:400px;
margin-bottom:40px;
}

/* RASTREIO */

.tracking-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:450px;
}

.tracking-box h2{
margin-bottom:20px;
}

.tracking-box input{
width:70%;
padding:12px;
border:1px solid #ccc;
border-radius:5px;
}

.tracking-box button{
padding:12px 20px;
background:#4d148c;
color:white;
border:none;
border-radius:5px;
margin-left:10px;
cursor:pointer;
}

/* BANNERS */

.banner{
width:100%;
margin-top:50px;
}

.banner img{
width:100%;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="fedex.png">
</div>

<nav>
<a href="#">Serviços</a>
<a href="#">Rastreamento</a>
<a href="#">Suporte</a>
</nav>

</header>

<section class="hero">

<div class="hero-text">

<h1>Parceria <span>Magalu</span> e <span>FedEx</span></h1>

<p>
<strong>Programa de Bonificação Magalu!</strong>  
Confirme sua entrega e participe do sorteio de prêmios incríveis.
</p>

<div class="confirm-box">
⭐ Confirme sua entrega e concorra a prêmios exclusivos!
</div>

<div class="tracking-box">

<h2>Rastreie seu pedido</h2>

<input placeholder="Digite o código de rastreamento">
<button>Rastrear</button>

</div>

</div>

<div class="hero-img">
<img src="bannerfedex.png" style="width:500px;">
</div>

</section>

<div class="banner">
<img src="bannerfedex2.png">
</div>

<div class="banner">
<img src="BANNERMAGALU.png">
</div>

</body>
</html>
