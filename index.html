<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FedEx - Parceria Magalu</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">
<div class="container header-container">

<div class="header-logo">

<img src="logo-magalu-azul (1).png" class="header-logo-magalu" alt="Magalu">

<img src="fedex.png" class="header-logo-fedex" alt="FedEx">

</div>

<nav class="header-nav">
<a href="#">Serviços</a>
<a href="#">Rastreamento</a>
<a href="#">Suporte</a>
</nav>

</div>
</header>

<section class="hero">
<div class="container hero-container">

<div class="hero-text">

<h1>
Parceria <span class="highlight-blue">Magalu</span> e
<span class="highlight-purple">FedEx</span>
</h1>

<p>
<strong>Programa de Bonificação Magalu!</strong>
Confirme sua entrega e participe do sorteio de prêmios incríveis.
Entregas rápidas, seguras e confiáveis em todo o Brasil através da parceria entre Magalu e FedEx.
</p>

<button class="cta-button">
⭐ Confirme sua entrega e concorra a prêmios exclusivos!
</button>

<div class="tracking-box">

<h2>Rastreie seu pedido</h2>

<div class="tracking-form">
<input type="text" placeholder="Digite o código de rastreamento" id="trackingCode">
<button onclick="trackPackage()">Rastrear</button>
</div>

</div>

</div>

<div class="hero-image">
<img src="bannerfedex.png" alt="FedEx Magalu">
</div>

</div>
</section>

<script>
function trackPackage(){
const code = document.getElementById("trackingCode").value;

if(!code){
alert("Digite um código de rastreamento");
return;
}

window.location.href="rastreamento.html?code="+code;
}
</script>

</body>
</html>
