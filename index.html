<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Rastreamento de Encomendas</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<h1>Rastreamento de Encomendas</h1>

<input id="codigo" placeholder="Digite seu código">

<button onclick="buscar()">Rastrear</button>

<script>

function buscar(){

const code=document.getElementById("codigo").value

window.location="/rastreamento.html?code="+code

}

</script>

</body>

</html>
