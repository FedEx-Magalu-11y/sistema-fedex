<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FedEx x Magalu</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="home-container">

<header class="home-header">

<div class="header-content">

<div class="header-logo">

<div class="header-logo-wrapper">
<img src="logo-magalu.png" class="header-logo-magalu">
</div>

<div class="header-logo-wrapper">
<img src="fedex.png" class="header-logo-fedex">
</div>

</div>

</div>

</header>

<section class="hero-section">

<div class="hero-content">

<div class="hero-text">

<h1 class="hero-title">
Rastreamento <span class="highlight-fedex">FedEx</span>
</h1>

<div class="tracking-search-box">

<div class="search-title">
Rastreie seu pedido
</div>

<form class="search-form" onsubmit="buscar(event)">

<input
class="search-input"
id="codigo"
placeholder="Digite o código"
/>

<button class="search-button">
Rastrear
</button>

</form>

</div>

</div>

</div>

</section>

</div>

<script>

function buscar(e){

e.preventDefault()

const code = document.getElementById("codigo").value

window.location.href = "/rastreamento.html?code=" + code

}

</script>

</body>
</html>
