<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Painel Admin</title>

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://opiwznepfjcinxrymrxw.supabase.co"
const SUPABASE_KEY="sb_publishable_F7z4q7UuxxNc13r4rDubZA_LsFF1fEB"

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

</script>

</head>

<body>

<h1>Painel Admin</h1>

<input id="codigo" placeholder="Código (opcional)">
<input id="nome" placeholder="Destinatário">
<input id="endereco" placeholder="Endereço">
<input id="localizacao" placeholder="Localização">
<input id="status" placeholder="Status">

<button onclick="criar()">Criar</button>

<hr>

<div id="lista"></div>

<script>

function gerarCodigo(){

const numero=Math.floor(Math.random()*9000000000)+1000000000

return "PQ"+numero+"BR"

}

async function criar(){

let code=document.getElementById("codigo").value

if(!code) code=gerarCodigo()

const nome=document.getElementById("nome").value
const endereco=document.getElementById("endereco").value
const status=document.getElementById("status").value
const location=document.getElementById("localizacao").value

const timeline=[{

title:status,
description:status,
location:location,
date:new Date().toISOString()

}]

await db.from("trackings_test").insert([{

code:code,
recipient_name:nome,
address:endereco,
status:status,
timeline:timeline,
last_update:new Date().toISOString()

}])

alert("Criado")

carregar()

}

async function carregar(){

const {data}=await db
.from("trackings_test")
.select("*")
.order("id",{ascending:false})

const lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(r=>{

lista.innerHTML+=`

<div style="margin-bottom:15px">

<b>${r.code}</b><br>

${r.recipient_name}

<br><br>

<button onclick="ver('${r.code}')">Ver</button>

<button onclick="excluir('${r.code}')">Excluir</button>

</div>

`

})

}

async function excluir(code){

await db.from("trackings_test")
.delete()
.eq("code",code)

carregar()

}

function ver(code){

window.open("/rastreamento.html?code="+code)

}

carregar()

</script>

</body>
</html>
