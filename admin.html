<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://opiwznepfjcinxrymrxw.supabase.co"
const SUPABASE_KEY="sb_publishable_F7z4q7UuxxNc13r4rDubZA_LsFF1fEB"

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

</script>

</head>

<body>

<div class="home-container">

<header class="home-header">

<div class="header-content">

<div class="header-logo">

<div class="header-logo-wrapper">
<img src="/fedex.png" class="header-logo-fedex">
</div>

</div>

</div>

</header>


<section class="hero-section">

<div class="hero-content">

<div class="hero-text">

<h1 class="hero-title">
Painel <span class="highlight-fedex">Admin</span>
</h1>


<div class="tracking-search-box">

<div class="search-title">
Criar rastreio
</div>

<input class="search-input" id="codigo" placeholder="Código (opcional)">
<input class="search-input" id="nome" placeholder="Destinatário">
<input class="search-input" id="endereco" placeholder="Endereço">
<input class="search-input" id="localizacao" placeholder="Localização">
<input class="search-input" id="status" placeholder="Status">

<button class="search-button" onclick="criar()">
Criar
</button>

</div>


<br><br>


<div class="tracking-search-box">

<div class="search-title">
Rastreios criados
</div>

<div id="lista"></div>

</div>


</div>
</div>
</section>

</div>

<script>

function gerarCodigo(){

const numero=Math.floor(Math.random()*9000000000)+1000000000
return "PQ"+numero+"BR"

}

async function criar(){

let code=document.getElementById("codigo").value

if(!code) code=gerarCodigo()

const nome=document.getElementById("nome").value
const endereco=document.getElementById("endereco").value
const status=document.getElementById("status").value
const location=document.getElementById("localizacao").value

const timeline=[{

title:status,
description:status,
location:location,
date:new Date().toISOString()

}]

await db.from("trackings_test").insert([{

code:code,
recipient_name:nome,
address:endereco,
status:status,
timeline:timeline,
last_update:new Date().toISOString()

}])

alert("Rastreio criado")

carregar()

}

async function carregar(){

const {data}=await db
.from("trackings_test")
.select("*")
.order("id",{ascending:false})

const lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(r=>{

lista.innerHTML+=`

<div style="margin-bottom:20px">

<b>${r.code}</b><br>
${r.recipient_name}

<br><br>

<button class="search-button" onclick="ver('${r.code}')">
Ver
</button>

<button class="search-button" onclick="excluir('${r.code}')">
Excluir
</button>

</div>

`

})

}

async function excluir(code){

await db.from("trackings_test")
.delete()
.eq("code",code)

carregar()

}

function ver(code){

window.open("/rastreamento.html?code="+code)

}

carregar()

</script>

</body>
</html>
