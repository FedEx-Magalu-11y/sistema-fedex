<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Área Administrativa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

.criar{background:#1a73e8;color:white;}
.atualizar{background:#ff9800;color:white;}
.ver{background:#1a73e8;color:white;}
.excluir{background:#e53935;color:white;}

</style>

</head>

<body>

<div id="loginBox" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f5f7fb;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
width:300px;
text-align:center;
">

<h2>Login Administrativo</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()" style="
width:100%;
background:#1a73e8;
color:white;
padding:10px;
border:none;
border-radius:6px;
margin-top:10px;
">
Entrar </button>

<p id="erroLogin" style="color:red;margin-top:10px;"></p>

</div>

</div>

<div class="container">

<h2>Área Administrativa</h2>

<div class="card">

<h3>Criar Rastreamento</h3>

<input id="codigo" placeholder="Código de rastreio (deixe vazio para gerar automático)">
<input id="destinatario" placeholder="Destinatário">
<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Rua e Bairro (automático)">
<input id="numero" placeholder="Número da casa">
<input id="complemento" placeholder="Complemento (Apto, Bloco, etc)">

<button class="criar" onclick="criarRastreio()">
Criar Rastreamento
</button>

</div>

<div class="card">

<h3>Rastreamentos</h3>
<div id="lista"></div>

</div>

</div>

<script>

const ADMIN_USER="admin"
const ADMIN_PASS="123456"

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(user===ADMIN_USER && pass===ADMIN_PASS){

document.getElementById("loginBox").style.display="none"

}else{

document.getElementById("erroLogin").innerText="Usuário ou senha incorretos"

}

}

const SUPABASE_URL="https://opiwznepfjcinxrymrxw.supabase.co"
const SUPABASE_KEY="sb_publishable_F7z4q7UuxxNc13r4rDubZA_LsFF1fEB"

const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

document.getElementById("cep").addEventListener("input",function(e){

let v=e.target.value.replace(/\D/g,'')

if(v.length>5){
v=v.slice(0,5)+"-"+v.slice(5,8)
}

e.target.value=v

})

document.getElementById("cep").addEventListener("blur",buscarCEP)

async function buscarCEP(){

const cep=document.getElementById("cep").value.replace(/\D/g,'')

if(cep.length!==8) return

try{

const response=await fetch("https://brasilapi.com.br/api/cep/v1/"+cep)

const data=await response.json()

if(data.street){

const endereco=
data.street+", "+
data.neighborhood+", "+
data.city+" - "+
data.state

document.getElementById("endereco").value=endereco

}

}catch{

alert("Erro ao buscar CEP")

}

}

function gerarCodigo(){

const numeros=Math.floor(Math.random()*9000000000)+1000000000
return "PQ"+numeros+"BR"

}

async function criarRastreio(){

let code=document.getElementById("codigo").value

if(!code){
code=gerarCodigo()
}

const recipient=document.getElementById("destinatario").value
const baseEndereco=document.getElementById("endereco").value
const numero=document.getElementById("numero").value
const complemento=document.getElementById("complemento").value
const cep=document.getElementById("cep").value.replace(/\D/g,'')

const address=baseEndereco+", "+numero+(complemento ? " - "+complemento : "")

let cidade=""
let estado=""

try{

const response=await fetch("https://brasilapi.com.br/api/cep/v1/"+cep)
const data=await response.json()

cidade=data.city
estado=data.state

}catch{

alert("Erro ao buscar CEP")
return

}

const agora=new Date().toISOString()

const timeline=[{

title:"Seu pacote foi postado",
description:"Objeto postado",
location:`Agência de Origem - ${cidade} - ${estado}`,
date:agora

}]

await db
.from("trackings_test")
.insert([{

code:code,
recipient_name:recipient,
address:address,
status:"Postado",
timeline:timeline,
cep:cep,
last_update:agora,
is_verified:true

}])

alert("Criado com sucesso")

carregar()

}

async function atualizarStatus(code){

const ordem=[
"Postado",
"Em movimento",
"Em trânsito",
"Em distribuição",
"Entregue"
]

const {data}=await db
.from("trackings_test")
.select("*")
.eq("code",code)
.single()

let indice=ordem.indexOf(data.status)

if(indice===ordem.length-1){
alert("Entrega já finalizada")
return
}

let proximo=ordem[indice+1]

let cidade=""
let estado=""

try{

const response=await fetch("https://brasilapi.com.br/api/cep/v1/"+data.cep)
const cepData=await response.json()

cidade=cepData.city
estado=cepData.state

}catch{

cidade="Centro Logístico"
estado=""

}

let descricao=""
let local=""

if(proximo==="Em movimento"){
descricao="O pacote está transitando entre a agência e o centro de distribuição mais próximo"
local=`Centro de Distribuição - ${cidade} - ${estado}`
}

if(proximo==="Em trânsito"){
descricao="Pacote em rota para o centro de distribuição regional"
local=`Unidade de Logística Regional - ${cidade} - ${estado}`
}

if(proximo==="Em distribuição"){
descricao="Pacote saiu para entrega"
local=`Agência de Distribuição - ${cidade} - ${estado}`
}

if(proximo==="Entregue"){
descricao="Entrega realizada com sucesso"
local=`${cidade} - ${estado}`
}

let timeline=data.timeline

if(typeof timeline==="string"){
timeline=JSON.parse(timeline)
}

if(!Array.isArray(timeline)){
timeline=[]
}

const agora=new Date().toISOString()

timeline.push({
title:proximo,
description:descricao,
location:local,
date:agora
})

await db
.from("trackings_test")
.update({
status:proximo,
timeline:timeline,
last_update:agora
})
.eq("code",code)

alert("Status atualizado para "+proximo)

carregar()

}

async function excluir(code){

if(!confirm("Excluir rastreamento?")) return

await db
.from("trackings_test")
.delete()
.eq("code",code)

carregar()

}

function ver(code){

window.open("/rastreamento.html?code="+code,"_blank")

}

async function carregar(){

const {data}=await db
.from("trackings_test")
.select("*")
.order("id",{ascending:false})

const lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(r=>{

lista.innerHTML+=`

<div style="border:1px solid #ddd;padding:15px;margin-bottom:10px;border-radius:6px">

<b>${r.code}</b><br>
${r.recipient_name}<br>
${r.address}

<div style="margin-top:10px">

<button class="ver" onclick="ver('${r.code}')">Ver</button>

<button class="atualizar" onclick="atualizarStatus('${r.code}')">Atualizar Status</button>

<button class="excluir" onclick="excluir('${r.code}')">Excluir</button>

</div>

</div>

`

})

}

carregar()

</script>

</body>
</html>
