<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

</head>

<body>

<h2>Painel Admin</h2>

<input id="codigo" placeholder="Código (opcional)">
<input id="nome" placeholder="Destinatário">
<input id="endereco" placeholder="Endereço">
<input id="localizacao" placeholder="Localização">
<input id="status" placeholder="Status">

<button onclick="criar()">Criar</button>

<hr>

<div id="lista"></div>

<script>

function gerarCodigo(){

const numeros=Math.floor(Math.random()*9000000000)+1000000000
return "PQ"+numeros+"BR"

}

async function criar(){

let code=document.getElementById("codigo").value

if(!code){
code=gerarCodigo()
}

const nome=document.getElementById("nome").value
const endereco=document.getElementById("endereco").value
const status=document.getElementById("status").value
const location=document.getElementById("localizacao").value

const timeline=[{

title:status,
description:status,
location:location,
date:new Date().toISOString()

}]

await db
.from("trackings_test")
.insert([{

code:code,
recipient_name:nome,
address:endereco,
timeline:timeline,
status:status,
last_update:new Date().toISOString()

}])

alert("Criado")

carregar()

}

async function carregar(){

const {data}=await db
.from("trackings_test")
.select("*")
.order("id",{ascending:false})

const lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(r=>{

lista.innerHTML+=`

<div>

<b>${r.code}</b><br>
${r.recipient_name}<br>

<button onclick="ver('${r.code}')">
Ver
</button>

<button onclick="excluir('${r.code}')">
Excluir
</button>

</div>

`

})

}

async function excluir(code){

await db
.from("trackings_test")
.delete()
.eq("code",code)

carregar()

}

function ver(code){

window.open("/rastreamento.html?code="+code)

}

carregar()

</script>

</body>
</html>
