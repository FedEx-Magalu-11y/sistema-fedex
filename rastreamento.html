<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rastreamento FedEx</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="tracking-container">

<div class="tracking-content">

<div class="tracking-main-card">

<div class="tracking-code-label">
Seu código de rastreamento é
</div>

<div class="tracking-code" id="codigo"></div>

<div class="tracking-info-section">

<div class="tracking-info-item">

<div class="info-label">
Destinatário:
</div>

<div class="info-value" id="destinatario"></div>

</div>

</div>

<div class="tracking-address-section">

<div class="address-header">
<div class="address-label">Endereço de Entrega:</div>
</div>

<div class="address-value" id="endereco"></div>

</div>

<div class="tracking-update-bar" id="ultima">
Última atualização
</div>

</div>

<div class="tracking-help-card">

<div class="help-title">
Precisa de Ajuda?
</div>

<button class="help-button support">
Falar com Suporte
</button>

<button class="help-button faq">
Perguntas Frequentes
</button>

</div>

<div class="tracking-timeline" id="timeline">

</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

const banco = {

"PQ0051595372BR":{

destinatario:"ANA FLAVIA MARTINS INCALADO",

endereco:"Rua Iracema, Nossa Senhora do Carmo, Sete Lagoas, MG, 133",

timeline:[

{
data:"19/02/2026, 14:00",
status:"Seu pacote foi postado",
desc:"Objeto postado após o pagamento",
local:"Sete Lagoas - MG",
setor:"Postagem"
},

{
data:"20/02/2026, 16:30",
status:"Seu pacote está em movimento",
desc:"O pacote está transitando entre a agência e o centro de distribuição mais próximo",
local:"Centro de Distribuição - Sete Lagoas - MG",
setor:"Transporte"
},

{
data:"21/02/2026, 18:00",
status:"Seu pacote está em trânsito",
desc:"Pacote em rota para o centro de distribuição regional",
local:"Unidade de Logística Regional - Sete Lagoas - MG",
setor:"Logística"
},

{
data:"22/02/2026, 10:00",
status:"Seu pacote está em distribuição",
desc:"Pacote saiu para entrega",
local:"Agência de Distribuição - Sete Lagoas - MG",
setor:"Distribuição"
}

]

}

}

if(!banco[code]){

document.body.innerHTML="<h2 style='padding:40px'>Código não encontrado</h2>"
return

}

const dados = banco[code]

document.getElementById("codigo").innerText = code
document.getElementById("destinatario").innerText = dados.destinatario
document.getElementById("endereco").innerText = dados.endereco

document.getElementById("ultima").innerText =
"Última atualização em: " + dados.timeline[dados.timeline.length-1].data.split(",")[0]

let html=""

dados.timeline.forEach((t,i)=>{

html += `

<div class="timeline-item ${i==dados.timeline.length-1 ? "active":""}">

<div class="timeline-dot"></div>

<div class="timeline-content">

<div class="timeline-date">
${t.data}
</div>

<div class="timeline-status">
${t.status}
</div>

<div class="timeline-description">
${t.desc}
</div>

<div class="timeline-location">
${t.local}
</div>

<div class="timeline-sector">
Setor: ${t.setor}
</div>

</div>

</div>

`

})

document.getElementById("timeline").innerHTML = html

</script>

</body>
</html>
