<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rastreamento</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

</head>

<body>

<div class="tracking-container">

<div class="tracking-main-card">

<div class="tracking-code-label">
Código de rastreamento
</div>

<div class="tracking-code" id="codigo"></div>

<div class="tracking-info-section">

<div class="tracking-info-item">
<div class="info-label">Destinatário</div>
<div class="info-value" id="destinatario"></div>
</div>

<div class="tracking-info-item">
<div class="info-label">Endereço</div>
<div class="info-value" id="endereco"></div>
</div>

</div>

</div>

<div class="tracking-timeline" id="timeline"></div>

</div>

<script src="js/rastreamento.js"></script>

</body>
</html>
