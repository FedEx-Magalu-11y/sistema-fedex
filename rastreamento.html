<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rastreamento FedEx</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="home-header">

<div class="header-content">

<div class="header-logo">

<div class="header-logo-wrapper">
<img src="logo-magalu-azul (1).png" class="header-logo-magalu">
</div>

<div class="header-logo-wrapper">
<img src="fedex.png" class="header-logo-fedex">
</div>

</div>

</div>

</header>


<section style="padding:80px">

<h1>Rastreamento do Pedido</h1>

<div id="resultado"></div>

</section>


<script>

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

const banco = {

"PQ0051595372BR":{

status:"Em transporte",
local:"Centro logístico São Paulo",
previsao:"2 dias"

},

"PQ8844551122BR":{

status:"Saiu para entrega",
local:"Unidade Rio de Janeiro",
previsao:"Hoje"

},

"PQ7779993333BR":{

status:"Aguardando confirmação",
local:"Centro logístico Curitiba",
previsao:"3 dias"

}

}

if(banco[code]){

document.getElementById("resultado").innerHTML = `

<h2>Código: ${code}</h2>

<p>Status: ${banco[code].status}</p>

<p>Localização: ${banco[code].local}</p>

<p>Previsão de entrega: ${banco[code].previsao}</p>

`

}else{

document.getElementById("resultado").innerHTML = `

<h2>Código não encontrado</h2>

<p>Verifique o código de rastreamento.</p>

`

}

</script>

</body>
</html>
