<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FedEx - Rastreamento</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header class="header">
<div class="container">
<img src="/fedex.png" class="logo">
</div>
</header>

<div class="container rastreamento-container">

<p>Seu código de rastreamento é</p>
<h1 id="codigo"></h1>

<p><b>Destinatário:</b></p>
<p id="destinatario"></p>

<p><b>Endereço de Entrega:</b></p>
<p id="endereco"></p>

<p>Última atualização em: <span id="atualizacao"></span></p>

<h3>Precisa de Ajuda?</h3>
<button>Falar com Suporte</button>
<button>Perguntas Frequentes</button>

<div id="timeline"></div>

</div>

<footer>
<img src="/fedex.png" width="120">
</footer>

<script>

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

document.getElementById("codigo").innerText = code || "BR000000000BR"

const destinatario = "João da Silva"
const endereco = "Rua das Flores 123, Centro, São Paulo - SP"

document.getElementById("destinatario").innerText = destinatario
document.getElementById("endereco").innerText = endereco

document.getElementById("atualizacao").innerText =
new Date().toLocaleDateString()

// pega estado do endereço
const estado = endereco.split("-")[1].trim()

const eventos = [

{
data:"19/02/2026 14:00",
titulo:"Seu pacote foi postado",
descricao:"Objeto postado após o pagamento",
local:"Agência de Origem - "+estado
},

{
data:"20/02/2026 16:30",
titulo:"Seu pacote está em movimento",
descricao:"Pacote em trânsito entre unidades",
local:"Centro de Distribuição - "+estado
},

{
data:"21/02/2026 18:00",
titulo:"Seu pacote está em trânsito",
descricao:"Encaminhado para unidade regional",
local:"Logística Regional - "+estado
},

{
data:"22/02/2026 10:00",
titulo:"Seu pacote está em distribuição",
descricao:"Objeto saiu para entrega",
local:"Agência de Distribuição - "+estado
}

]

const timeline = document.getElementById("timeline")

eventos.forEach(e=>{

timeline.innerHTML += `
<div class="timeline-item">

<p>${e.data}</p>

<h3>${e.titulo}</h3>

<p>${e.descricao}</p>

<p>${e.local}</p>

</div>
`

})

</script>

</body>
</html>
