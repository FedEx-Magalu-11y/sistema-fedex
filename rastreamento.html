<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Rastreamento</title>

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container rastreio-container">

<div class="rastreamento-grid">

<div class="card rastreamento-info">

<p class="rastreamento-label">
Seu código de rastreamento é
</p>

<h2 id="codigo" class="rastreamento-codigo"></h2>

<div class="rastreamento-dados">

<div>
<strong>Destinatário:</strong><br>
<span id="destinatario"></span>
</div>

<div class="endereco-box">
<strong>Endereço de Entrega:</strong><br>
<span id="endereco"></span>
</div>

<div id="ultima" class="ultima-atualizacao"></div>

</div>

</div>


<div class="card suporte-box">

<h3>Precisa de Ajuda?</h3>

<button class="btn-suporte">
Falar com Suporte
</button>

<button class="btn-faq">
Perguntas Frequentes
</button>

</div>

</div>


<div class="card timeline-box">

<div id="timeline"></div>

</div>

</div>


<script>

const SUPABASE_URL="https://opiwznepfjcinxrymrxw.supabase.co"
const SUPABASE_KEY="sb_publishable_F7z4q7UuxxNc13r4rDubZA_LsFF1fEB"

const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function carregarRastreamento(){

const params=new URLSearchParams(window.location.search)
const code=params.get("code")

if(!code){

document.getElementById("codigo").innerText="Código inválido"
return

}

const {data,error}=await db
.from("trackings_test")
.select("*")
.eq("code",code)
.single()

if(error || !data){

document.getElementById("codigo").innerText="Rastreamento não encontrado"
return

}

document.getElementById("codigo").innerText=data.code
document.getElementById("destinatario").innerText=data.recipient_name
document.getElementById("endereco").innerText=data.address

document.getElementById("ultima").innerText=
"Última atualização em: "+
new Date(data.last_update).toLocaleDateString("pt-BR")

const timeline=document.getElementById("timeline")

timeline.innerHTML=""

if(data.timeline){

data.timeline.reverse().forEach(item=>{

timeline.innerHTML+=`

<div class="timeline-item">

<div class="timeline-date">
${new Date(item.date).toLocaleString("pt-BR")}
</div>

<div class="timeline-status">
${item.status}
</div>

<div class="timeline-location">
${item.location}
</div>

</div>

`

})

}

}

carregarRastreamento()

</script>

</body>
</html>
