<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FedEx - Rastreamento</title>

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="tracking-container">

<div class="tracking-content">

<div class="tracking-main-card">

<div class="tracking-header">

<div class="tracking-logo">
<img src="/fedex.png" class="tracking-header-logo">
</div>

</div>

<div class="tracking-code-label">
Seu código de rastreamento
</div>

<div id="codigo" class="tracking-code"></div>

<div class="tracking-info-section">

<div class="tracking-info-item">
<span class="info-label">Destinatário</span>
<span id="destinatario" class="info-value"></span>
</div>

</div>

<div class="tracking-address-section">

<div class="address-header">
<span class="address-label">Endereço de Entrega</span>
</div>

<div id="endereco" class="address-value"></div>

</div>

<div class="tracking-update-bar">
Última atualização em: <span id="atualizacao"></span>
</div>

</div>


<div class="tracking-help-card">

<div class="help-title">
Precisa de Ajuda?
</div>

<button class="help-button support">
Falar com Suporte
</button>

<button class="help-button faq">
Perguntas Frequentes
</button>

</div>

<div id="timeline" class="tracking-timeline"></div>

</div>

<div class="tracking-logos">
<img src="/fedex.png" class="tracking-logo-fedex">
<img src="/logo-magalu-azul (1).png" class="tracking-logo-magalu">
</div>

</div>


<script>

const SUPABASE_URL="https://opiwznepfjcinxrymrxw.supabase.co"
const SUPABASE_KEY="sb_publishable_F7z4q7UuxxNc13r4rDubZA_LsFF1fEB"

const db = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

document.getElementById("codigo").innerText = code

async function carregar(){

const {data,error} = await db
.from("trackings_test")
.select("*")
.eq("code",code)
.single()

if(error || !data){

document.getElementById("timeline").innerHTML=`

<div class="tracking-error-message">

<div class="error-icon">⚠️</div>

<div class="error-title">
Rastreamento não encontrado
</div>

<p class="error-text">
O código <strong>${code}</strong> não foi localizado.
</p>

<p class="error-text">
Verifique o número e tente novamente.
</p>

</div>

`

return

}

document.getElementById("destinatario").innerText = data.recipient_name
document.getElementById("endereco").innerText = data.address

document.getElementById("atualizacao").innerText =
new Date(data.last_update).toLocaleString("pt-BR")

const timeline = document.getElementById("timeline")

timeline.innerHTML=""

data.timeline.forEach((evento,index)=>{

timeline.innerHTML+=`

<div class="timeline-item ${index==data.timeline.length-1 ? "active":""}">

<div class="timeline-dot"></div>

<div class="timeline-content">

<div class="timeline-date">
${new Date(evento.date).toLocaleString("pt-BR")}
</div>

<div class="timeline-status">
${evento.title}
</div>

<div class="timeline-description">
${evento.description}
</div>

<div class="timeline-location">
📍 ${evento.location}
</div>

</div>

</div>

`

})

}

carregar()

</script>

</body>

</html>
