<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FedEx - Rastreamento</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header class="header">
    <div class="container">
        <img src="/fedex.png" class="logo">
    </div>
</header>

<div class="container rastreamento-container">

    <div class="rastreamento-grid">

        <div class="rastreamento-info">

            <p class="rastreamento-label">Seu código de rastreamento é</p>
            <h1 id="codigo-rastreio"></h1>

            <div class="destinatario-box">
                <p><strong>Destinatário:</strong></p>
                <p id="destinatario"></p>
            </div>

            <div class="endereco-box">
                <p><strong>Endereço de Entrega:</strong></p>
                <p id="endereco"></p>
            </div>

            <div class="ultima-atualizacao">
                Última atualização em: <span id="atualizacao"></span>
            </div>

        </div>

        <div class="rastreamento-ajuda">

            <h3>Precisa de Ajuda?</h3>

            <button class="btn-suporte">
                Falar com Suporte
            </button>

            <button class="btn-faq">
                Perguntas Frequentes
            </button>

        </div>

    </div>

    <div class="timeline" id="timeline">

    </div>

</div>

<footer class="footer">
    <img src="/magalu.png" class="magalu">
    <img src="/fedex.png" class="fedex-footer">
</footer>

<script>

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

document.getElementById("codigo-rastreio").innerText = code || "BR000000000BR"

document.getElementById("destinatario").innerText = "João da Silva"

document.getElementById("endereco").innerText =
"Rua das Flores 123, Centro, São Paulo - SP"

document.getElementById("atualizacao").innerText =
new Date().toLocaleDateString()

const eventos = [
{
data:"19/02/2026 14:00",
titulo:"Seu pacote foi postado",
descricao:"Objeto postado após o pagamento",
local:"Sete Lagoas - MG"
},
{
data:"20/02/2026 16:30",
titulo:"Seu pacote está em movimento",
descricao:"Pacote em trânsito entre unidades",
local:"Centro de Distribuição - MG"
},
{
data:"21/02/2026 18:00",
titulo:"Seu pacote está em trânsito",
descricao:"Encaminhado para unidade regional",
local:"Logística Regional"
},
{
data:"22/02/2026 10:00",
titulo:"Seu pacote está em distribuição",
descricao:"Objeto saiu para entrega",
local:"Agência de Distribuição"
}
]

const timeline = document.getElementById("timeline")

eventos.forEach(e=>{

timeline.innerHTML += `
<div class="timeline-item">

<div class="timeline-data">${e.data}</div>

<div class="timeline-content">

<h3>${e.titulo}</h3>

<p>${e.descricao}</p>

<span class="local">${e.local}</span>

</div>

</div>
`

})

</script>

</body>
</html>
