<script>

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

document.getElementById("codigo").innerText = code

const rastreios = JSON.parse(localStorage.getItem("rastreios")) || []

const rastreio = rastreios.find(r => r.codigo === code)

if(!rastreio){
document.getElementById("timeline").innerHTML = "Rastreamento não encontrado"
throw new Error("Rastreamento não encontrado")
}

document.getElementById("destinatario").innerText = rastreio.nome
document.getElementById("endereco").innerText = rastreio.endereco
document.getElementById("atualizacao").innerText = new Date().toLocaleDateString()

// pega estado do endereço automaticamente
const estado = rastreio.endereco.split("-").pop().trim()

const todosStatus = [

{
id:"postado",
data:"19/02/2026 14:00",
titulo:"Seu pacote foi postado",
descricao:"Objeto postado após o pagamento",
local:"Agência de Origem - "+estado
},

{
id:"movimento",
data:"20/02/2026 16:30",
titulo:"Seu pacote está em movimento",
descricao:"Pacote em trânsito entre unidades",
local:"Centro de Distribuição - "+estado
},

{
id:"transito",
data:"21/02/2026 18:00",
titulo:"Seu pacote está em trânsito",
descricao:"Encaminhado para unidade regional",
local:"Logística Regional - "+estado
},

{
id:"distribuicao",
data:"22/02/2026 10:00",
titulo:"Seu pacote está em distribuição",
descricao:"Objeto saiu para entrega",
local:"Agência de Distribuição - "+estado
}

]

// ordem dos status
const ordem = ["postado","movimento","transito","distribuicao"]

const indiceAtual = ordem.indexOf(rastreio.status)

const eventos = todosStatus.slice(0, indiceAtual + 1)

const timeline = document.getElementById("timeline")

timeline.innerHTML = ""

eventos.forEach(e=>{

timeline.innerHTML += `
<div class="timeline-item">

<p>${e.data}</p>

<h3>${e.titulo}</h3>

<p>${e.descricao}</p>

<p>${e.local}</p>

</div>
`

})

</script>
