<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
</head>

<body>

<h2>Criar / Atualizar Rastreamento</h2>

<input id="codigo" placeholder="Código"><br><br>

<input id="status" placeholder="Status (Ex: Em transporte)"><br><br>

<input id="cep" placeholder="CEP"><br><br>

<textarea id="timeline" placeholder="Evento da timeline"></textarea><br><br>

<button onclick="salvar()">Salvar</button>

<p id="resultado"></p>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://opiwznepfjcinxrymrxw.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waXd6bmVwZmpjaW54cnltcnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTQ3MDQsImV4cCI6MjA4ODQ3MDcwNH0.bcfSAqQzPNs1BISoKBUP2p1KU0MIgCzFimX4OzhU0yU"

const supabase = createClient(supabaseUrl, supabaseKey)

window.salvar = async function(){

const codigo = document.getElementById("codigo").value
const status = document.getElementById("status").value
const cep = document.getElementById("cep").value
const timeline = document.getElementById("timeline").value

const { error } = await supabase
.from("trackings_test")
insert([
{
code: codigo,
status: status,
cep: cep,
timeline: timeline,
created_at: new Date(),
updated_at: new Date()
}
])

if(error){

document.getElementById("resultado").innerText = "Erro: " + error.message

}else{

document.getElementById("resultado").innerText = "Rastreamento salvo com sucesso"

}

}

</script>

</body>
</html>
