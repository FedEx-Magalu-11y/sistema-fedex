<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Área Administrativa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:6px;
margin-top:6px;
}

.criar{
background:#1a73e8;
color:white;
}

.ver{
background:#1a73e8;
color:white;
}

.status{
background:#ff9800;
color:white;
}

.excluir{
background:#e53935;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Área Administrativa</h2>

<div class="card">

<h3>Criar Rastreamento</h3>

<input id="codigo" placeholder="Código de rastreio">

<input id="destinatario" placeholder="Destinatário">

<input id="cep" placeholder="CEP">

<input id="endereco" placeholder="Endereço">

<input id="localizacao" placeholder="Localização inicial">

<select id="status">

<option>Postado</option>
<option>Em trânsito</option>
<option>Centro de distribuição</option>
<option>Saiu para entrega</option>
<option>Entregue</option>

</select>

<button class="criar" onclick="criarRastreio()">
Criar Rastreamento
</button>

</div>

<div class="card">

<h3>Rastreamentos</h3>

<div id="lista"></div>

</div>

</div>

<script>

const supabaseUrl="https://opiwznepfjcinxrymrxw.supabase.co"
const supabaseKey="sb_publishable_F7z4q7UuxxNc13r4rDubZA_LsFF1fEB"

const supabase=window.supabase.createClient(supabaseUrl,supabaseKey)

async function carregar(){

const {data}=await supabase
.from("trackings_test")
.select("*")
.order("created_at",{ascending:false})

const lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(r=>{

lista.innerHTML+=`

<div style="border:1px solid #ddd;padding:15px;margin-bottom:10px;border-radius:6px">

<b>${r.code}</b><br>
${r.recipient_name}<br>
${r.address}<br>
<b>Status:</b> ${r.status}

<div style="margin-top:10px">

<button class="ver" onclick="ver('${r.code}')">
Ver
</button>

<button class="status" onclick="definirStatus('${r.code}','Postado')">
Postado
</button>

<button class="status" onclick="definirStatus('${r.code}','Em trânsito')">
Em trânsito
</button>

<button class="status" onclick="definirStatus('${r.code}','Centro de distribuição')">
Centro
</button>

<button class="status" onclick="definirStatus('${r.code}','Saiu para entrega')">
Saiu entrega
</button>

<button class="status" onclick="definirStatus('${r.code}','Entregue')">
Entregue
</button>

<button class="excluir" onclick="excluir('${r.code}')">
Excluir
</button>

</div>

</div>

`

})

}

async function criarRastreio(){

const code=document.getElementById("codigo").value
const recipient=document.getElementById("destinatario").value
const address=document.getElementById("endereco").value
const status=document.getElementById("status").value
const location=document.getElementById("localizacao").value
const cep=document.getElementById("cep").value

const timeline=[{

status:status,
location:location,
date:new Date().toISOString()

}]

const {error}=await supabase
.from("trackings_test")
.insert([{

code:code,
recipient_name:recipient,
address:address,
status:status,
timeline:timeline,
cep:cep,
last_update:new Date().toISOString(),
is_verified:true

}])

if(error){

alert("Erro ao criar")

}else{

alert("Criado com sucesso")

carregar()

}

}

async function definirStatus(code,status){

const localizacao=prompt("Localização do pacote")

const {data}=await supabase
.from("trackings_test")
.select("timeline")
.eq("code",code)
.single()

let timeline=data.timeline || []

timeline.push({

status:status,
location:localizacao,
date:new Date().toISOString()

})

await supabase
.from("trackings_test")
.update({

status:status,
timeline:timeline,
last_update:new Date().toISOString()

})
.eq("code",code)

alert("Status atualizado")

carregar()

}

async function excluir(code){

if(!confirm("Excluir rastreamento?")) return

await supabase
.from("trackings_test")
.delete()
.eq("code",code)

carregar()

}

function ver(code){

window.open("/rastreamento/"+code,"_blank")

}

carregar()

</script>

</body>
</html>
