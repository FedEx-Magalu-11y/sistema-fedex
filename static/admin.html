<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Rastreamento</title>
</head>

<body>

<h2>Criar Rastreamento</h2>

<label>Código:</label><br>
<input id="codigo"><br><br>

<label>Nome do destinatário:</label><br>
<input id="nome"><br><br>

<label>Endereço:</label><br>
<input id="endereco"><br><br>

<button onclick="criar()">Criar Rastreio</button>

<p id="status"></p>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://opiwznepfjcinxrymrxw.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waXd6bmVwZmpjaW54cnltcnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTQ3MDQsImV4cCI6MjA4ODQ3MDcwNH0.bcfSAqQzPNs1BISoKBUP2p1KU0MIgCzFimX4OzhU0yU"

const supabase = createClient(supabaseUrl, supabaseKey)

window.criar = async function(){

const codigo = document.getElementById("codigo").value
const nome = document.getElementById("nome").value
const endereco = document.getElementById("endereco").value

const { data, error } = await supabase
.from("trackings_test")
.insert([
{
code: codigo,
recipient_name: nome,
address: endereco
}
])

if(error){

document.getElementById("status").innerText = "Erro: " + error.message

}else{

document.getElementById("status").innerText = "Rastreamento criado com sucesso"

}

}

</script>

</body>
</html>
