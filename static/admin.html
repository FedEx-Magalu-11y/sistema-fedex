<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
</head>

<body>

<h2>Criar Rastreamento</h2>

<input id="codigo" placeholder="Código"><br><br>
<input id="nome" placeholder="Destinatário"><br><br>
<input id="endereco" placeholder="Endereço"><br><br>
<input id="status" placeholder="Status inicial"><br><br>

<button onclick="criar()">Criar Rastreamento</button>

<hr>

<h2>Atualizar Status</h2>

<input id="codigo_update" placeholder="Código"><br><br>
<input id="novo_status" placeholder="Novo status"><br><br>

<button onclick="atualizar()">Atualizar Status</button>

<p id="resultado"></p>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://opiwznepfjcinxrymrxw.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waXd6bmVwZmpjaW54cnltcnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTQ3MDQsImV4cCI6MjA4ODQ3MDcwNH0.bcfSAqQzPNs1BISoKBUP2p1KU0MIgCzFimX4OzhU0yU"

const supabase = createClient(supabaseUrl, supabaseKey)

window.criar = async function(){

const codigo = document.getElementById("codigo").value
const nome = document.getElementById("nome").value
const endereco = document.getElementById("endereco").value
const status = document.getElementById("status").value

const { error } = await supabase
.from("trackings_test")
.insert([
{
code: codigo,
recipient_name: nome,
address: endereco,
status: status,
last_update: new Date()
}
])

if(error){

document.getElementById("resultado").innerText = "Erro: " + error.message

}else{

document.getElementById("resultado").innerText = "Rastreamento criado"

}

}

window.atualizar = async function(){

const codigo = document.getElementById("codigo_update").value
const novoStatus = document.getElementById("novo_status").value

const { error } = await supabase
.from("trackings_test")
.update({
status: novoStatus,
last_update: new Date()
})
.eq("code", codigo)

if(error){

document.getElementById("resultado").innerText = "Erro: " + error.message

}else{

document.getElementById("resultado").innerText = "Status atualizado"

}

}

</script>

</body>
</html>
